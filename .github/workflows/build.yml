name: Build & Release ServerSwitcher

on:
  release:
    types: [created]
    
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: windows-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller colorama

      - name: Build ServerSwitcher
        run: |
          pyinstaller --onefile --clean --icon=icon.ico --name=ServerSwitcher switcher.py

      - name: Prepare release archive
        run: |
          mkdir release_assets
          copy dist\ServerSwitcher.exe release_assets\ServerSwitcher.exe
          copy config.json release_assets\config.json
          powershell Compress-Archive -Path release_assets\* -DestinationPath ServerSwitcher.zip -Force

      - name: Upload release archive
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ServerSwitcher.zip
          asset_name: ServerSwitcher.zip
          asset_content_type: application/zip