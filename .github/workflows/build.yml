name: Build and Release ServerSwitcher

on:
  push:
    tags:
      - 'v*'   # Trigger on tags like v1.0, v1.1
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller colorama
      - name: Build EXE
        run: |
          pyinstaller --onefile --clean --icon=icon.ico --name=ServerSwitcher switcher.py
      - name: Prepare artifact
        run: |
          mkdir artifact
          copy dist\ServerSwitcher.exe artifact\ServerSwitcher.exe
          copy config.json artifact\config.json  # optional: include config
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: "Automated build for ServerSwitcher."
      - name: Upload EXE to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifact\ServerSwitcher.exe
          asset_name: ServerSwitcher.exe
          asset_content_type: application/vnd.microsoft.portable-executable
      - name: Upload config.json to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifact\config.json
          asset_name: config.json
          asset_content_type: application/json